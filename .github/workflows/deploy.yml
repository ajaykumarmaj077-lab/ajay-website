name: Docker Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 13.201.190.104
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /var/www/html

            # Pull latest code
            git pull origin main

            # Stop old container
            docker rm -f mycontainer || true

            # Build new image
            docker build -t my-website .

            # Run new container
            docker run -d -p 8081:80 --name mycontainer my-website
